<div role="group" aria-labelledby="multipad-h3d-heading">
    <h3 id="multipad-h3d-heading" class="text-sm font-medium text-gray-400 mb-2">Multipad Highway 3D</h3>
    <p class="text-xs text-gray-500 mb-4">
        The visualization shell is installed. The MVP renderer will start with
        a generic pad-grid profile, with hi-hat pedal and kick hits shown as
        top and bottom pedal surfaces.
    </p>

    <fieldset disabled aria-describedby="multipad-h3d-phase-note" class="space-y-4 opacity-70">
        <div>
            <label for="multipad-h3d-pad-profile" class="text-xs font-medium text-gray-400 mb-1 block">Pad profile</label>
            <select id="multipad-h3d-pad-profile"
                class="w-full bg-dark-700 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 outline-none">
                <option value="generic-3x3" selected>Generic pad grid (MVP 3x3)</option>
            </select>
        </div>

        <div>
            <label for="multipad-h3d-pedal-profile" class="text-xs font-medium text-gray-400 mb-1 block">Pedal profile</label>
            <select id="multipad-h3d-pedal-profile"
                class="w-full bg-dark-700 border border-gray-800 rounded-lg px-3 py-2 text-xs text-gray-300 outline-none">
                <option value="generic-pedals" selected>Generic pedals</option>
            </select>
        </div>
    </fieldset>

    <p id="multipad-h3d-phase-note" class="text-xs text-gray-500 mt-4">
        Profile editing, camera controls, and visual intensity controls arrive
        after the data and renderer phases.
    </p>
</div>
